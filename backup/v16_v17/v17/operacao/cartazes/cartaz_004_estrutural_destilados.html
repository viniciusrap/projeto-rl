<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartaz — Destilados</title>
<style>
  @page { size: A4 portrait; margin: 1cm; }
  body {
    font-family: 'Impact', 'Arial Black', sans-serif;
    margin: 0; padding: 40px;
    text-align: center;
    color: #1a1a1a;
  }
  .banner {
    background: linear-gradient(135deg, #dc2626 0%, #fbbf24 100%);
    color: white;
    padding: 20px 40px;
    border-radius: 12px;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .produto {
    font-size: 56px;
    font-weight: 900;
    line-height: 1.1;
    margin: 60px 0 30px;
    text-transform: uppercase;
  }
  .par {
    font-size: 36px;
    margin: 20px 0;
    color: #6b7280;
  }
  .preco-de {
    font-size: 24px;
    color: #9ca3af;
    text-decoration: line-through;
    margin: 30px 0 10px;
  }
  .preco-por {
    font-size: 96px;
    font-weight: 900;
    color: #dc2626;
    line-height: 1;
  }
  .preco-por .reais { font-size: 64px; vertical-align: top; }
  .periodo {
    font-size: 28px;
    font-weight: 700;
    margin-top: 50px;
    padding: 16px;
    background: #fbbf24;
    border-radius: 8px;
    display: inline-block;
  }
  .footer {
    margin-top: 80px;
    color: #6b7280;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="banner">DRINK DE SÁBADO</div>
  <div class="produto">Destilados</div>
  <div class="par">+ Gelo</div>
  <div class="preco-de">De R$ 45.34</div>
  <div class="preco-por">
    <span class="reais">R$</span> 39<span class="reais">,90</span>
  </div>
  <div class="periodo">R$ 39,90</div>
  <div class="footer">Auto Posto Parque Viana · Promoção válida no estoque vigente</div>
</body>
</html>
