# ============================================================================
# CAMPANHAS ESTRUTURAIS — sempre ativas no calendário operacional
# ============================================================================
# Definidas com base em:
# - Conhecimento de varejo de conveniência (Vinicius + dono do posto)
# - Lift real do Instacart (32M transações)
# - Padrão histórico de venda do Auto Posto Viana (6 anos)
# ============================================================================

campanhas:
  - nome: Esquenta de Sexta
    categoria: cerveja
    par_combo: snack
    intensidade: combo
    preco_combo_alvo: 14.90
    dias_semana: [4, 5]              # sex, sáb (0=seg)
    meses_ativos: null               # todos
    comunicacao: "CERVEJA + AMENDOIM • R$ 14,90 • Sex-Sáb"
    justificativa: |
      Cerveja+snack é cesta clássica de fim-de-semana.
      Instacart lift 2.5 (cerveja+snack confirmado).
      Gera fluxo: cliente entra pela cerveja, leva snack como ticket extra.

  - nome: Café da Manhã
    categoria: cafe
    par_combo: padaria
    intensidade: combo
    preco_combo_alvo: 9.90
    dias_semana: [0, 1, 2, 3, 4]     # seg-sex
    meses_ativos: null
    turnos_ativos: [0]               # só manhã
    comunicacao: "CAFÉ + PÃO • R$ 9,90 • Manhãs Seg-Sex"
    justificativa: |
      Rotina cliente que para no posto antes do trabalho.
      Padaria+café harmonia 2.2 calibrada.
      Pouco risco de canibalização (cliente faz isso de qualquer jeito).

  - nome: Verão Gelado
    categoria: gelo
    par_combo: refrigerante
    intensidade: combo
    preco_combo_alvo: 12.90
    dias_semana: [5, 6]              # sáb, dom
    meses_ativos: [12, 1, 2, 3]      # dez-mar (verão BR)
    comunicacao: "GELO + REFRI • R$ 12,90 • Fins de semana"
    justificativa: |
      Verão + fim-de-semana = pico de demanda histórico.
      fator_dia[gelo,sáb]=2.24, fator_mes[gelo,dez]=2.19 (calibrado posto).
      Combo aumenta ticket sem matar margem (gelo já vende).

  - nome: Drink de Sábado
    categoria: destilados
    par_combo: gelo
    intensidade: combo
    preco_combo_alvo: 39.90
    dias_semana: [5]                 # sábado
    meses_ativos: null
    comunicacao: "DRINK COMPLETO: WHISKY/CACHAÇA + GELO • R$ 39,90"
    justificativa: |
      Instacart lift 14.0 (destilados + vinho confirmado).
      Destilados+gelo é par natural drinks em casa.
      Margem alta (destilados 92.9%), pouco volume — combo viabiliza.

# ============================================================================
# Diretrizes para criar novas campanhas estruturais
# ============================================================================
diretrizes:
  - Só promover categorias com elasticidade documentada (>1.2 em algum dataset)
  - Preço final SEMPRE em formato psicológico (.90 ou .50)
  - Comunicação direta (≤8 palavras visíveis no cartaz)
  - Duração mínima: 1 mês ativo (não muda toda semana)
  - Lift do par de combo ≥ 1.5 (Instacart ou Dunnhumby)
  - Aprovar com dono do posto antes de ativar
